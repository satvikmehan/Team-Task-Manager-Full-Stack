<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Task Manager{% endblock %}</title>
    <style>
        :root {
            --ink: #111827;
            --muted: #5b6472;
            --line: #d9dee8;
            --surface: #ffffff;
            --page: #f4f7fb;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #10b981;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(16, 185, 129, 0.12)),
                var(--page);
        }

        .shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
        }

        .auth-panel {
            background: var(--surface);
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--line);
        }

        .brand {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 36px;
        }

        h1 {
            font-size: 32px;
            line-height: 1.15;
            margin: 0 0 10px;
        }

        .lead {
            color: var(--muted);
            margin: 0 0 28px;
            line-height: 1.5;
        }

        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 18px;
        }

        label {
            font-size: 14px;
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 13px 14px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        textarea {
            min-height: 104px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
        }

        .check-list {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }

        .check-row {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 11px 12px;
        }

        .check-row input {
            width: auto;
            box-shadow: none;
        }

        .check-row label {
            font-weight: 400;
        }

        .error {
            background: #fff1f0;
            border: 1px solid #ffc9c4;
            color: var(--danger);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .success {
            background: #ecfdf3;
            border: 1px solid #b7ebc6;
            color: #067647;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 8px;
        }

        .button {
            appearance: none;
            border: 1px solid transparent;
            border-radius: 8px;
            min-height: 46px;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }

        .button.primary {
            background: var(--primary);
            color: #fff;
        }

        .button.primary:hover {
            background: var(--primary-dark);
        }

        .button.secondary {
            background: #fff;
            border-color: var(--line);
            color: var(--ink);
        }

        .button.secondary:hover {
            background: #f8fafc;
        }

        .visual {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 56px;
        }

        .board {
            width: min(620px, 100%);
            display: grid;
            gap: 16px;
        }

        .lane {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        .lane-title {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .task-row {
            height: 42px;
            border-radius: 6px;
            background: #fff;
            border: 1px solid var(--line);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .task-row::before {
            content: "";
            position: absolute;
            inset: 12px auto 12px 12px;
            width: 38%;
            border-radius: 999px;
            background: #cbd5e1;
        }

        .task-row::after {
            content: "";
            position: absolute;
            top: 12px;
            right: 12px;
            width: 58px;
            height: 18px;
            border-radius: 999px;
            background: rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 820px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .auth-panel {
                min-height: 100vh;
                padding: 32px 22px;
                border-right: 0;
            }

            .visual {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="auth-panel">
            <div class="brand">Team Task Manager</div>
            {% block content %}{% endblock %}
        </section>

        <section class="visual" aria-hidden="true">
            <div class="board">
                <div class="lane">
                    <div class="lane-title">Todo</div>
                    <div class="task-row"></div>
                    <div class="task-row"></div>
                </div>
                <div class="lane">
                    <div class="lane-title">In Progress</div>
                    <div class="task-row"></div>
                </div>
                <div class="lane">
                    <div class="lane-title">Done</div>
                    <div class="task-row"></div>
                    <div class="task-row"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
