{% extends "auth_base.html" %}

{% block title %}Delete Task | Team Task Manager{% endblock %}

{% block content %}
<h1>Delete task</h1>
<p class="lead">{{ task.title }}</p>

<form method="post">
    {% csrf_token %}
    <div class="actions">
        <button class="button primary" type="submit">Delete Task</button>
        <a class="button secondary" href="/tasks/manage/">Cancel</a>
    </div>
</form>
{% endblock %}
